[workspace]
name = "vr-subtitle"
version = "0.1.0"
description = "VR subtitle app and CLIs; reuses ../python/sense_voice for ASR, LLM, SRT, and audio."
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.10.*"
ffmpeg = "*"
tomli = "*"

[tasks]
web = { cmd = "python app.py", description = "Run the VR subtitle web app" }
add-subtitle = { cmd = "python scripts/add_subtitle.py", description = "NFS VR mp4 -> WAV -> SRT -> copy back to NFS" }
gen-subtitle-task = { cmd = "python scripts/gen_subtitle_task.py", description = "Generate task.toml from VR mp4 paths" }
run-subtitle-task = { cmd = "python scripts/run_subtitle_task.py", description = "Process a task.toml batch" }
cron-subtitle-batch = { cmd = "python scripts/cron_subtitle_batch.py", description = "Generate and run the default cron subtitle batch" }
publish-vr-srt = { cmd = "python scripts/publish_vr_srt.py", description = "Copy generated SRT next to source video" }
sync-vr-audio = { cmd = "python scripts/sync_vr_audio.py", description = "Extract WAV from NFS/gvfs VR video" }
test = { cmd = "python tests/test_project_smoke.py", description = "No-GPU smoke tests for local CLIs" }
