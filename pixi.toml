[workspace]
name = "vr-subtitle"
version = "0.1.0"
description = "VR mp4 to ASR and Chinese SRT pipeline"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.10.*"
pip = "*"
ffmpeg = "*"
tomli = "*"
huggingface_hub = ">=0.20"

[tasks]
web = { cmd = "python app.py", description = "Run the local VR subtitle web app" }
install-gpu = { cmd = "python -m pip install --upgrade pip && python -m pip install torch==2.3.0+cu121 torchaudio==2.3.0+cu121 --index-url https://download.pytorch.org/whl/cu121 && python -m pip install -i https://mirrors.aliyun.com/pypi/simple --trusted-host mirrors.aliyun.com modelscope huggingface 'huggingface_hub<1.0' 'funasr>=1.1.3' 'numpy<=1.26.4' 'transformers<5'", description = "Install SenseVoice/FunASR CUDA dependencies" }
add-subtitle = { cmd = "python scripts/add_subtitle.py", description = "mp4 -> WAV -> ASR SRT -> Chinese SRT -> publish" }
gen-subtitle-task = { cmd = "python scripts/gen_subtitle_task.py", description = "Generate data/tasks/*.toml from mp4 files" }
run-subtitle-task = { cmd = "python scripts/run_subtitle_task.py", description = "Process a subtitle task TOML" }
cron-subtitle-batch = { cmd = "python scripts/cron_subtitle_batch.py", description = "Generate and run the default subtitle batch" }
publish-vr-srt = { cmd = "python scripts/publish_vr_srt.py", description = "Copy generated SRT files next to source mp4" }
sync-vr-audio = { cmd = "python scripts/sync_vr_audio.py", description = "Extract local WAV cache from VR mp4 files" }
subtitle-pipeline = { cmd = "python scripts/subtitle_pipeline.py", description = "Run ASR/ZH SRT generation for audio clips" }
test = { cmd = "python test/test_vr_subtitle_smoke.py", description = "No-GPU smoke tests" }
